<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字算命 - 命盤排盤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-stone-100 min-h-screen">
    <header class="bg-white border-b border-stone-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="w-8 h-8 bg-stone-900 text-white flex items-center justify-center rounded-lg text-sm font-bold">八字</span>
                <span class="text-lg font-serif font-bold text-stone-900">命盤排盤系統</span>
            </div>
            <div>
                <a href="/clients" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium text-stone-600 hover:text-stone-900 hover:bg-stone-100 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    客戶管理
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- 輸入表單 -->
        <section class="bg-white rounded-2xl shadow-sm border border-stone-100 p-6 mb-6">
            <!-- 輸入模式切換 -->
            <div class="flex gap-2 mb-4">
                <button type="button" onclick="showDateInput()" id="btn-date-input" class="px-4 py-2 rounded-lg bg-stone-900 text-white font-medium">日期輸入</button>
                <button type="button" onclick="showPillarInput()" id="btn-pillar-input" class="px-4 py-2 rounded-lg bg-stone-200 text-stone-700 font-medium">四柱輸入</button>
            </div>

            <!-- 日期輸入表單 -->
            <form id="date-input-form" action="/calculate" method="post" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">姓名</label>
                    <input type="text" name="name" placeholder="請輸入姓名（可選）"
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">性別</label>
                    <select name="gender" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="男">男 (乾造)</option>
                        <option value="女">女 (坤造)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">曆法</label>
                    <select name="calendar" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="公曆">公曆 (西曆)</option>
                        <option value="農曆">農曆 (農曆)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">出生城市</label>
                    <div class="flex gap-2">
                        <input type="text" name="birth_city" id="birth_city" value="香港" placeholder="例如：香港、深圳"
                            class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <input type="hidden" name="longitude" id="birth_longitude" value="">
                        <button type="button" onclick="openMapModal()" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 border border-stone-200 rounded-lg text-stone-600 transition flex items-center justify-center shrink-0" title="在地圖上精確選擇">
                            🗺️
                        </button>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">年份</label>
                    <input type="number" name="year" value="1995" min="1900" max="2100"
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">月份</label>
                    <input type="number" name="month" value="1" min="1" max="12"
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">日期</label>
                    <input type="number" name="day" value="1" min="1" max="31"
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">時/分</label>
                    <div class="flex gap-2">
                        <input type="number" name="hour" value="12" min="0" max="23" placeholder="時"
                            class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <input type="number" name="minute" value="0" min="0" max="59" placeholder="分"
                            class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                    </div>
                </div>

                <button type="submit" class="lg:col-span-4 w-full bg-stone-900 text-white hover:bg-black font-medium py-3 rounded-lg text-base flex items-center justify-center gap-2 transition shadow-lg shadow-stone-200">
                    <span>開始排盤</span>
                </button>
            </form>

            <!-- 四柱輸入表單（隱藏） -->
            <form id="pillar-input-form" action="/calculate_from_pillars" method="post" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 items-end">
                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">姓名</label>
                    <input type="text" name="name" placeholder="姓名（可選）"
                        class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">性別</label>
                    <select name="gender" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="男">男 (乾造)</option>
                        <option value="女">女 (坤造)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">年干</label>
                    <select name="year_gan" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="甲">甲</option>
                        <option value="乙">乙</option>
                        <option value="丙">丙</option>
                        <option value="丁">丁</option>
                        <option value="戊">戊</option>
                        <option value="己">己</option>
                        <option value="庚">庚</option>
                        <option value="辛">辛</option>
                        <option value="壬">壬</option>
                        <option value="癸">癸</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">年支</label>
                    <select name="year_zhi" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="子">子</option>
                        <option value="丑">丑</option>
                        <option value="寅">寅</option>
                        <option value="卯">卯</option>
                        <option value="辰">辰</option>
                        <option value="巳">巳</option>
                        <option value="午">午</option>
                        <option value="未">未</option>
                        <option value="申">申</option>
                        <option value="酉">酉</option>
                        <option value="戌">戌</option>
                        <option value="亥">亥</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">月干</label>
                    <select name="month_gan" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="甲">甲</option>
                        <option value="乙">乙</option>
                        <option value="丙">丙</option>
                        <option value="丁">丁</option>
                        <option value="戊">戊</option>
                        <option value="己">己</option>
                        <option value="庚">庚</option>
                        <option value="辛">辛</option>
                        <option value="壬">壬</option>
                        <option value="癸">癸</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">月支</label>
                    <select name="month_zhi" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="子">子</option>
                        <option value="丑">丑</option>
                        <option value="寅">寅</option>
                        <option value="卯">卯</option>
                        <option value="辰">辰</option>
                        <option value="巳">巳</option>
                        <option value="午">午</option>
                        <option value="未">未</option>
                        <option value="申">申</option>
                        <option value="酉">酉</option>
                        <option value="戌">戌</option>
                        <option value="亥">亥</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">日干</label>
                    <select name="day_gan" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="甲">甲</option>
                        <option value="乙">乙</option>
                        <option value="丙">丙</option>
                        <option value="丁">丁</option>
                        <option value="戊">戊</option>
                        <option value="己">己</option>
                        <option value="庚">庚</option>
                        <option value="辛">辛</option>
                        <option value="壬">壬</option>
                        <option value="癸">癸</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">日支</label>
                    <select name="day_zhi" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="子">子</option>
                        <option value="丑">丑</option>
                        <option value="寅">寅</option>
                        <option value="卯">卯</option>
                        <option value="辰">辰</option>
                        <option value="巳">巳</option>
                        <option value="午">午</option>
                        <option value="未">未</option>
                        <option value="申">申</option>
                        <option value="酉">酉</option>
                        <option value="戌">戌</option>
                        <option value="亥">亥</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">時干</label>
                    <select name="hour_gan" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="甲">甲</option>
                        <option value="乙">乙</option>
                        <option value="丙">丙</option>
                        <option value="丁">丁</option>
                        <option value="戊">戊</option>
                        <option value="己">己</option>
                        <option value="庚">庚</option>
                        <option value="辛">辛</option>
                        <option value="壬">壬</option>
                        <option value="癸">癸</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-stone-500">時支</label>
                    <select name="hour_zhi" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-200">
                        <option value="子">子</option>
                        <option value="丑">丑</option>
                        <option value="寅">寅</option>
                        <option value="卯">卯</option>
                        <option value="辰">辰</option>
                        <option value="巳">巳</option>
                        <option value="午">午</option>
                        <option value="未">未</option>
                        <option value="申">申</option>
                        <option value="酉">酉</option>
                        <option value="戌">戌</option>
                        <option value="亥">亥</option>
                    </select>
                </div>

                <button type="submit" class="lg:col-span-8 w-full bg-stone-900 text-white hover:bg-black font-medium py-3 rounded-lg text-base flex items-center justify-center gap-2 transition shadow-lg shadow-stone-200">
                    <span>反推出生日時</span>
                </button>
            </form>
        </section>
    </main>
    <!-- Map Modal -->
    <div id="map-modal" class="fixed inset-0 bg-stone-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl overflow-hidden flex flex-col h-[80vh]">
            <div class="px-5 py-4 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <div>
                    <h3 class="font-serif font-bold text-stone-900 text-lg">選擇出生地點</h3>
                    <p class="text-xs text-stone-500 mt-1">請在地圖上點擊您的確切出生位置，以獲得最精準的真太陽時經度。</p>
                </div>
                <button onclick="closeMapModal()" class="text-stone-400 hover:text-stone-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-1 relative">
                <div id="map" class="absolute inset-0"></div>
            </div>
            <div class="p-4 border-t border-stone-100 bg-stone-50 flex items-center justify-between">
                <div class="text-sm">
                    <span class="text-stone-500">已選經度：</span>
                    <span id="selected-lng-display" class="font-bold text-indigo-600">尚未選擇</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeMapModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-stone-600 hover:bg-stone-200 transition">取消</button>
                    <button onclick="confirmMapSelection()" class="px-4 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 transition shadow-sm">確認位置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        let map = null;
        let marker = null;
        let selectedLng = null;
        let selectedLat = null;

        function openMapModal() {
            document.getElementById('map-modal').classList.remove('hidden');
            
            if (!map) {
                // Initialize map (default to China center)
                map = L.map('map').setView([35.86166, 104.195397], 4);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

                map.on('click', function(e) {
                    if (marker) {
                        map.removeLayer(marker);
                    }
                    marker = L.marker(e.latlng).addTo(map);
                    selectedLng = e.latlng.lng;
                    selectedLat = e.latlng.lat;
                    
                    document.getElementById('selected-lng-display').textContent = selectedLng.toFixed(4) + '°E';
                });
            } else {
                setTimeout(() => map.invalidateSize(), 100);
            }
        }

        function closeMapModal() {
            document.getElementById('map-modal').classList.add('hidden');
        }

        async function confirmMapSelection() {
            if (selectedLng === null) {
                alert('請先在地圖上點擊選擇位置！');
                return;
            }
            
            // Set hidden input
            document.getElementById('birth_longitude').value = selectedLng;
            
            // Optional: Reverse geocoding to update city name text input
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${selectedLat}&lon=${selectedLng}&zoom=10&accept-language=zh-TW,zh-CN`);
                const data = await res.json();
                if (data && data.address) {
                    let city = data.address.city || data.address.town || data.address.county || data.address.state;
                    if (city) {
                        document.getElementById('birth_city').value = city;
                    }
                }
            } catch (e) {
                console.error("Reverse geocoding failed", e);
            }
            
            closeMapModal();
        }
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
